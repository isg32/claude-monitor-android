name: Android CI/CD Build & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Enable manual triggering from GitHub Action tab

permissions:
  contents: write # Required to upload assets to releases

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1' # Meets minimum supported Gradle version (9.3.1) for Android Gradle Plugin 9.1.1

      - name: Create dummy google-services.json if missing
        run: |
          if [ ! -f app/google-services.json ]; then
            echo '{"project_info":{"project_number":"123456789012","project_id":"dummy-project","storage_bucket":"dummy-project.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789012:android:0123456789abcdef012345","android_client_info":{"package_name":"com.example"}},"api_key":[{"current_key":"dummy_api_key"}],"services":{"appinvite_service":{"status":1}}}],"configuration_version":"1"}' > app/google-services.json
          fi

      - name: Build with Gradle
        run: gradle assembleDebug -Pkotlin.compiler.execution.strategy=daemon

      - name: Check Build Output
        run: ls -la app/build/outputs/apk/debug/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

